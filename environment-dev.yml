name: agentbook-dev
# conda-forge (free, no auth) — the `defaults` channel routes through
# repo.anaconda.cloud which requires Anaconda auth and 403s without it.
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python>=3.10,<3.14
  # Dev deps
  - pytest>=7.0
  - pytest-asyncio>=0.21
  - pytest-cov>=4.0
  - ruff>=0.1.0
  - mypy>=1.0.0
  - pre-commit>=3.0.0
